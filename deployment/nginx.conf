server {
    listen 80;
    server_name mpi530.elektryk.cloud;  # <- ZMIEN na swoja domene

    # Frontend - pliki statyczne React
    root /home/mpi530-app/frontend/build;
    index index.html;

    # Kompresja
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Cache dla plikow statycznych
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API - przekierowanie do FastAPI backendu
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # React Router - przekieruj wszystkie sciezki do index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
